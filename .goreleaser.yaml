version: 2

project_name: weicrawl

changelog:
  disable: true

builds:
  - id: weicrawl
    main: ./cmd/weicrawl
    binary: weicrawl
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X github.com/vincentkoc/weicrawl/internal/version.Version={{ .Version }} -X github.com/vincentkoc/weicrawl/internal/version.Commit={{ .Commit }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64

archives:
  - ids:
      - weicrawl
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - SPEC.md
      - LICENSE
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: checksums.txt
