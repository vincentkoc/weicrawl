name: Update Homebrew Tap

on:
  workflow_call:
    inputs:
      tag_name:
        description: "Release tag to sync (for example: v0.1.0)"
        required: true
        type: string
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to sync (for example: v0.1.0)"
        required: true
        type: string

permissions:
  contents: read

env:
  TAP_REPO: ${{ vars.HOMEBREW_TAP_REPO || 'vincentkoc/tap' }}
  FORMULA: weicrawl

jobs:
  update-tap:
    runs-on: ubuntu-latest
    if: startsWith(github.event.release.tag_name || inputs.tag_name, 'v')
    steps:
      - name: Resolve release tag
        run: |
          set -euo pipefail
          echo "RELEASE_TAG=${{ github.event.release.tag_name || inputs.tag_name }}" >> "$GITHUB_ENV"

      - name: Dispatch tap formula update
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          export GH_TOKEN="${HOMEBREW_TAP_TOKEN:-${HOMEBREW_TAP_GITHUB_TOKEN:-}}"
          if [ -z "${GH_TOKEN}" ]; then
            echo "::warning::Homebrew tap sync skipped; set HOMEBREW_TAP_TOKEN with workflow access to ${TAP_REPO}."
            exit 0
          fi

          if ! can_push="$(gh api "repos/${TAP_REPO}" --jq '.permissions.push // false')"; then
            echo "::warning::Homebrew tap sync skipped; HOMEBREW_TAP_TOKEN cannot access ${TAP_REPO}."
            exit 0
          fi
          if [ "${can_push}" != "true" ]; then
            echo "::warning::Homebrew tap sync skipped; HOMEBREW_TAP_TOKEN needs push access to ${TAP_REPO}."
            exit 0
          fi

          request_id="${FORMULA}-${RELEASE_TAG}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          expected_title="Update ${FORMULA} for ${RELEASE_TAG} (${request_id})"

          gh workflow run update-formula.yml \
            --repo "${TAP_REPO}" \
            --ref main \
            -f formula="${FORMULA}" \
            -f tag="${RELEASE_TAG}" \
            -f repository="${GITHUB_REPOSITORY}" \
            -f description="Local-first Weixin/WeChat archive CLI" \
            -f artifact_template="{formula}_{version}_{target}.tar.gz" \
            -f request_id="${request_id}"

          run_id=""
          for _ in {1..30}; do
            run_id=$(gh run list \
              --repo "${TAP_REPO}" \
              --workflow update-formula.yml \
              --branch main \
              --event workflow_dispatch \
              --limit 20 \
              --json databaseId,displayTitle \
              --jq ".[] | select(.displayTitle == \"${expected_title}\") | .databaseId" | head -n1)
            if [ -n "${run_id}" ]; then
              break
            fi
            sleep 5
          done

          if [ -z "${run_id}" ]; then
            echo "::error::Could not find tap workflow run with title: ${expected_title}"
            exit 1
          fi

          gh run watch "${run_id}" \
            --repo "${TAP_REPO}" \
            --exit-status \
            --interval 10
